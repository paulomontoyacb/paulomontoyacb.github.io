<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroTuner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
    <div class="site-heading-row">
        <h1 class="site-title">MetroTuner</h1>
    </div>
</header>

<main class="app-layout">
    <section class="metronomo">
        <h2 class="panel-title">Metronomo</h2>
        <div class="contatore" id="contatoreVisivo">1</div>

        <div class="bpm-box">
            <div class="bpm-value"><span id="bpmValue">60</span> BPM</div>
            <div class="tempo-controls">
                <input type="range" id="bpmSlider" class="slider" min="30" max="250" value="60">
                <input type="text" id="bpmInput" class="tempo-input" inputmode="numeric" pattern="[0-9]*" value="60">
            </div>
            <div class="opzioni">
                <div class="opzione-riga">
                    <label for="timeSignature">Tempo</label>
                    <select id="timeSignature" class="selettore-tempo">
                        <option value="2">2/4</option>
                        <option value="3">3/4</option>
                        <option value="4" selected>4/4</option>
                        <option value="5">5/4</option>
                        <option value="6">6/4</option>
                        <option value="7">7/4</option>
                    </select>
                </div>
                <div class="opzione-riga">
                    <label for="accentoToggle">Battere</label>
                    <input type="checkbox" id="accentoToggle" class="check-accento" checked>
                </div>
                <div class="opzione-riga">
                    <label for="subdivisionSelect">Pattern ritmico</label>
                    <select id="subdivisionSelect" class="selettore-tempo">
                        <option value="1" selected>Quarti</option>
                        <option value="2">Ottavi</option>
                        <option value="3">Terzina</option>
                        <option value="4">Sedicesimi</option>
                        <option value="5">Quintine</option>
                        <option value="6">Sestine</option>
                        <option value="7">Settimine</option>
                    </select>
                </div>
                <div class="opzione-riga">
                    <label for="metronomeVolume">Volume</label>
                    <div class="drone-volume-row">
                        <input type="range" id="metronomeVolume" class="slider" min="0" max="100" value="50">
                        <span class="drone-volume-value" id="metronomeVolumeValue">50%</span>
                    </div>
                </div>
                <div class="opzione-riga">
                    <label for="coloriToggle">Colori visivi</label>
                    <input type="checkbox" id="coloriToggle" class="check-accento" checked>
                </div>
            </div>
        </div>

        <div class="controlli">
            <input type="button" value="Accendi metronomo" id="metronomeToggleBtn">
        </div>
    </section>

    <section class="accordatore">
        <h2 class="panel-title">Accordatore</h2>

        <div class="accordatore-display">
            <div class="accordatore-nota" id="tunerNote">--</div>
            <div class="accordatore-freq" id="tunerFreq">0.00 Hz</div>
            <div class="accordatore-cents" id="tunerCents">0.0 cent</div>
        </div>

        <div class="needle-wrap">
            <div class="needle-scale">
                <div class="needle-zones">
                    <div class="left"></div>
                    <div class="center"></div>
                    <div class="right"></div>
                </div>
                <div class="needle-center"></div>
                <div class="needle" id="tunerNeedle" style="left: 50%;"></div>
            </div>
            <div class="scale-labels">
                <span>-50</span>
                <span>-25</span>
                <span>0</span>
                <span>+25</span>
                <span>+50</span>
            </div>
        </div>

        <div class="accordatore-controlli">
            <button type="button" id="tunerToggleBtn">Attiva microfono</button>
        </div>

        <div class="opzioni accordatore-opzioni">
            <div class="opzione-riga">
                <label for="tuningReference">Accordatura</label>
                <select id="tuningReference" class="selettore-tempo">
                    <option value="440">La = 440 Hz</option>
                    <option value="442" selected>La = 442 Hz</option>
                </select>
            </div>

            <div class="opzione-riga">
                <label for="tunerMode">Modalità</label>
                <select id="tunerMode" class="selettore-tempo">
                    <option value="standard" selected>Standard</option>
                    <option value="bassi">Bassi</option>
                </select>
            </div>
        </div>

        <div class="accordatore-stato" id="tunerStatus">Premi "Attiva microfono".</div>

        <div class="accordatore-meta">
            <div>Nota target: <strong id="tunerTargetNote">--</strong></div>
            <div>Target Hz: <strong id="tunerTargetFreq">--</strong></div>
            <div>Confidence: <strong id="tunerClarity">--</strong></div>
            <div>Livello: <strong id="tunerLevel">--</strong></div>
            <div>Range auto: <strong id="tunerRange">--</strong></div>
            <div>Stato: <strong id="tunerLockState">--</strong></div>
        </div>

    </section>

    <section class="drone">
        <h2 class="panel-title">Drone</h2>

        <div class="drone-display">
            <div class="drone-note" id="droneCurrentNote">Do</div>
            <div class="drone-mode" id="droneCurrentMode">Scala maggiore</div>
        </div>

        <div class="controlli drone-controlli">
            <button type="button" id="droneToggleBtn">Accendi drone</button>
        </div>

        <div class="opzioni drone-opzioni">
            <div class="opzione-riga">
                <label for="droneNote">Nota</label>
                <select id="droneNote" class="selettore-tempo">
                    <option value="C" selected>Do</option>
                    <option value="C#">Do#</option>
                    <option value="D">Re</option>
                    <option value="D#">Re#</option>
                    <option value="E">Mi</option>
                    <option value="F">Fa</option>
                    <option value="F#">Fa#</option>
                    <option value="G">Sol</option>
                    <option value="G#">Sol#</option>
                    <option value="A">La</option>
                    <option value="A#">La#</option>
                    <option value="B">Si</option>
                </select>
            </div>

            <div class="opzione-riga">
                <label for="droneOctave">Ottava</label>
                <select id="droneOctave" class="selettore-tempo">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div class="opzione-riga">
                <label for="droneScaleMode">Scala</label>
                <select id="droneScaleMode" class="selettore-tempo">
                    <option value="major" selected>Maggiore</option>
                    <option value="minorNatural">Minore naturale</option>
                    <option value="minorHarmonic">Minore armonica</option>
                    <option value="minorMelodic">Minore melodica</option>
                    <option value="majorPentatonic">Pentatonica maggiore</option>
                    <option value="minorPentatonic">Pentatonica minore</option>
                    <option value="blues">Blues</option>
                    <option value="ionian">Ionia</option>
                    <option value="dorian">Dorica</option>
                    <option value="phrygian">Frigia</option>
                    <option value="lydian">Lidia</option>
                    <option value="mixolydian">Misolidia</option>
                    <option value="aeolian">Eolia</option>
                    <option value="locrian">Locria</option>
                </select>
            </div>

            <div class="opzione-riga">
                <label for="droneVolume">Volume</label>
                <div class="drone-volume-row">
                    <input type="range" id="droneVolume" class="slider" min="0" max="100" value="50">
                    <span class="drone-volume-value" id="droneVolumeValue">50%</span>
                </div>
            </div>
        </div>

        <div class="drone-degree-block">
            <div class="drone-degree-header">
                <div class="drone-degree-title">Note aggiunte della scala</div>
                <button type="button" id="droneClearDegreesBtn" class="drone-clear-btn">Cancella</button>
            </div>
            <div class="drone-degree-grid">
                <div class="drone-degree-option">
                    <label class="drone-degree-main" for="droneDegree2">
                        <input type="checkbox" id="droneDegree2" class="check-accento">
                        <div class="drone-degree-text">
                            <span class="drone-degree-name" id="droneDegree2Name">2a</span>
                            <span class="drone-degree-note" id="droneDegree2Label">Si3</span>
                        </div>
                    </label>
                    <label class="drone-degree-octave" for="droneDegree2High">
                        <span>8va</span>
                        <input type="checkbox" id="droneDegree2High" class="check-accento">
                    </label>
                    <label class="drone-degree-octave" for="droneDegree2DoubleHigh">
                        <span>15ma</span>
                        <input type="checkbox" id="droneDegree2DoubleHigh" class="check-accento">
                    </label>
                </div>

                <div class="drone-degree-option">
                    <label class="drone-degree-main" for="droneDegree3">
                        <input type="checkbox" id="droneDegree3" class="check-accento">
                        <div class="drone-degree-text">
                            <span class="drone-degree-name" id="droneDegree3Name">3a</span>
                            <span class="drone-degree-note" id="droneDegree3Label">Do#4</span>
                        </div>
                    </label>
                    <label class="drone-degree-octave" for="droneDegree3High">
                        <span>8va</span>
                        <input type="checkbox" id="droneDegree3High" class="check-accento">
                    </label>
                    <label class="drone-degree-octave" for="droneDegree3DoubleHigh">
                        <span>15ma</span>
                        <input type="checkbox" id="droneDegree3DoubleHigh" class="check-accento">
                    </label>
                </div>

                <div class="drone-degree-option">
                    <label class="drone-degree-main" for="droneDegree4">
                        <input type="checkbox" id="droneDegree4" class="check-accento">
                        <div class="drone-degree-text">
                            <span class="drone-degree-name" id="droneDegree4Name">4a</span>
                            <span class="drone-degree-note" id="droneDegree4Label">Re4</span>
                        </div>
                    </label>
                    <label class="drone-degree-octave" for="droneDegree4High">
                        <span>8va</span>
                        <input type="checkbox" id="droneDegree4High" class="check-accento">
                    </label>
                    <label class="drone-degree-octave" for="droneDegree4DoubleHigh">
                        <span>15ma</span>
                        <input type="checkbox" id="droneDegree4DoubleHigh" class="check-accento">
                    </label>
                </div>

                <div class="drone-degree-option">
                    <label class="drone-degree-main" for="droneDegree5">
                        <input type="checkbox" id="droneDegree5" class="check-accento">
                        <div class="drone-degree-text">
                            <span class="drone-degree-name" id="droneDegree5Name">5a</span>
                            <span class="drone-degree-note" id="droneDegree5Label">Mi4</span>
                        </div>
                    </label>
                    <label class="drone-degree-octave" for="droneDegree5High">
                        <span>8va</span>
                        <input type="checkbox" id="droneDegree5High" class="check-accento">
                    </label>
                    <label class="drone-degree-octave" for="droneDegree5DoubleHigh">
                        <span>15ma</span>
                        <input type="checkbox" id="droneDegree5DoubleHigh" class="check-accento">
                    </label>
                </div>

                <div class="drone-degree-option">
                    <label class="drone-degree-main" for="droneDegree6">
                        <input type="checkbox" id="droneDegree6" class="check-accento">
                        <div class="drone-degree-text">
                            <span class="drone-degree-name" id="droneDegree6Name">6a</span>
                            <span class="drone-degree-note" id="droneDegree6Label">Fa#4</span>
                        </div>
                    </label>
                    <label class="drone-degree-octave" for="droneDegree6High">
                        <span>8va</span>
                        <input type="checkbox" id="droneDegree6High" class="check-accento">
                    </label>
                    <label class="drone-degree-octave" for="droneDegree6DoubleHigh">
                        <span>15ma</span>
                        <input type="checkbox" id="droneDegree6DoubleHigh" class="check-accento">
                    </label>
                </div>

                <div class="drone-degree-option">
                    <label class="drone-degree-main" for="droneDegree7">
                        <input type="checkbox" id="droneDegree7" class="check-accento">
                        <div class="drone-degree-text">
                            <span class="drone-degree-name" id="droneDegree7Name">7a</span>
                            <span class="drone-degree-note" id="droneDegree7Label">Sol#4</span>
                        </div>
                    </label>
                    <label class="drone-degree-octave" for="droneDegree7High">
                        <span>8va</span>
                        <input type="checkbox" id="droneDegree7High" class="check-accento">
                    </label>
                    <label class="drone-degree-octave" for="droneDegree7DoubleHigh">
                        <span>15ma</span>
                        <input type="checkbox" id="droneDegree7DoubleHigh" class="check-accento">
                    </label>
                </div>

                <div class="drone-degree-option">
                    <label class="drone-degree-main" for="droneDegree8">
                        <input type="checkbox" id="droneDegree8" class="check-accento">
                        <div class="drone-degree-text">
                            <span class="drone-degree-name" id="droneDegree8Name">8a</span>
                            <span class="drone-degree-note" id="droneDegree8Label">La4</span>
                        </div>
                    </label>
                    <label class="drone-degree-octave" for="droneDegree8High">
                        <span>8va</span>
                        <input type="checkbox" id="droneDegree8High" class="check-accento">
                    </label>
                    <label class="drone-degree-octave" for="droneDegree8DoubleHigh">
                        <span>15ma</span>
                        <input type="checkbox" id="droneDegree8DoubleHigh" class="check-accento">
                    </label>
                </div>
            </div>
        </div>

        <div class="drone-status" id="droneStatus">Pronto.</div>
    </section>
</main>

<footer class="site-footer">
    <p class="site-credit site-credit-footer">Creato da Paulo Montoya</p>
</footer>

<script src="metro2.js"></script>
<script src="accordatore.js"></script>
<script src="drone.js"></script>

</body>
</html>
